  - {type: variant, offset: 543, length: 71, content: 他字勢力義故、闍字超過生老死義故、車字斷煩惱無餘義故、蹉字高出義故、詫字住義故、𠻬字教化邊地彌黎車義故梵本亦少一字。善家子！此是得十六字所出陀羅尼，名得陀羅尼。, 宮: ''}
