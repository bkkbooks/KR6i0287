  - {type: variant, offset: 1071, length: 87, content: 喜王！若菩薩摩訶薩正覺如是十六種字陀羅尼入門，如阿字無生義故、波字最勝義故、遮字度四流義故、那字說名色義故、陀字布施自守和合義故、沙字六通智義故、迦字不見業報義故、沙＝娑【宮】沙【大】，娑【宮】沙娑字諸法平等義故、伽字甚深義故, 宮: ''}
