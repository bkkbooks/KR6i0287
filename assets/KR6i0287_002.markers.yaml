  - {type: punctuation, offset: 614, content: 「, id: KR6i0287_T_002-bkkpn113}
  - {type: variant, offset: 614, length: 457, content: '「所出巧智解知諸法自空，選擇諸眾生心，出離諸煩惱，吐諸凡夫所取。通彼法相，度流轉海，善說令喜，設法施會。巧生諸字音智解知於空，樂佛解脫，捨愛、不愛而無悋惜。「於諸外道、他論如法降伏，說師子吼，得於佛智，興於法施，吐諸煩惱，破怨惡義。「信諸佛轉法輪，通達於如乃至知法，瞋、慢已離，欲泥不染。調御眾生除去於垢，能以悲水洗＝洒【三】洗【大】，洒【宋】【元】【明】洗洒

      於眾生；統領徒眾順得勢力，超過老、死念千數劫；總持法藏通達寂界，得空等智，順學＝覺【三】學【大】，覺【宋】【元】【明】學覺

      盡法。「諸眾生等所應讚歎，滿無障智、得無熱惱，熏習順行摧魔羅軍，蔭覆三千大千世界，順念前世，招涅槃地作依止趣，其在家者盡皆覆護。「知處非處，不捨先誓，於諸眾生以慈遍滿；知聚無生，所念聞意當作正直＝真【三】直【大】，真【宋】【元】【明】直真。「得栴檀那戒香，斷生死道，順得涅槃，知諸法如那字觸住。「喜王！彼如那字已上無字，彼亦無名、亦不可說、亦無有聲，不施設名、不知名說，彼諸聲言辭中，彼不過去、不未來、不現在，彼諸佛不已說、不今說、不當說，不生、不出，如是等相諸法菩薩當知。「喜王！復有十六字陀羅尼所入門，所謂：覺字行相說勝義法、度於四流、說無有名色法、善巧布施、自守住忍、不倚六根、行於六度、令滅欲煩惱故而為眾生說法、巧知諸法差別、得深無疑、說處非處、知諸眾生所行、忍麁惡言、捨皮肉髓、知念意行安住法界、解知那字盡入諸法。喜王！此是十六種字陀羅尼入門。', 宮: ''}
